name: Build & Release Kernel (Xeon E31270)

on:
  push:
    branches: [ "main", "xeon-e31270" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    container:
      image: archlinux:latest

    steps:
    - name: Install dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm base-devel git bc kmod inetutils cpio openssl elfutils python pahole zstd linux-firmware ccache

    - name: Configure makepkg
      run: |
        sed -i 's/#MAKEFLAGS="-j2"/MAKEFLAGS="-j$(nproc) -l$(nproc)"/g' /etc/makepkg.conf
        sed -i 's|!ccache|ccache|' /etc/makepkg.conf
        mkdir -p /home/builder/.ccache
        chown -R builder:builder /home/builder/.ccache

    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: /home/builder/.ccache
        key: ccache-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
        restore-keys: |
          ccache-${{ runner.os }}-${{ github.ref_name }}-
          ccache-${{ runner.os }}-

    - name: Build kernel via makepkg
      run: |
        set -e
        useradd -m builder
        mkdir -p /home/builder/.ccache
        chown -R builder:builder /home/builder/.ccache
        chown -R builder:builder "$GITHUB_WORKSPACE"

        echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
        chmod 0440 /etc/sudoers.d/builder

        su - builder -s /bin/bash -c "cd '$GITHUB_WORKSPACE' && \
          CCACHE_DIR=/home/builder/.ccache makepkg -sf --noconfirm"

    - name: Get kernel version
      id: version
      run: |
        KERNEL_VERSION=$(cat src/linux-flatten/version)
        echo "kernel_version=$KERNEL_VERSION" >> $GITHUB_OUTPUT
        echo "VERSION: $KERNEL_VERSION"
        ls -lh linux-flatten-*.pkg.tar.zst 2>/dev/null

    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/xeon-e31270'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.kernel_version }}
        name: linux-flatten ${{ steps.version.outputs.kernel_version }}
        body: |
          ## linux-flatten ${{ steps.version.outputs.kernel_version }}

          **Optimized for Intel Xeon E31270 (Sandy Bridge, 4c/8t)**

          ### Optimizations
          - **sched/flat** — flattened runqueue by Peter Zijlstra
          - **MSANDYBRIDGE** — Sandy Bridge native optimizations
          - **PREEMPT_LAZY** — minimal latency switching
          - **O3** (local) / **Os** (CI) — compiler optimization
          - **HZ=1000** — high timer frequency
          - **BBR (v3/mainline)** — modern TCP congestion control
          - **THP MADVISE** — safe huge pages
          - **ZSTD modules** — fast module loading
          - **NR_CPUS=8** — optimized for 4 cores / 8 threads
          - **No debug info** — minimal size

          ### Installation
          ```bash
          sudo pacman -U linux-flatten-*.pkg.tar.zst
          sudo mkinitcpio -p linux-flatten
          sudo reboot
          ```

          ### Verify
          ```bash
          uname -r
          cat /proc/version
          ```
        files: |
          linux-flatten-*.pkg.tar.zst
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
