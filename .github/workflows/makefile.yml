name: Build & Release Kernel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    container:
      image: archlinux:latest

    steps:
    - name: Install dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm base-devel git bc kmod inetutils cpio openssl elfutils python pahole zstd

    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Build kernel via makepkg
      run: |
        set -e
        # Clone kernel source into src/ for makepkg
        if [ ! -d src/linux-flatten ]; then
          git clone --depth=1 --single-branch -b sched/flat \
            https://git.kernel.org/pub/scm/linux/kernel/git/peterz/queue.git \
            src/linux-flatten
        fi

        # Build with makepkg (runs PKGBUILD: prepare, build, package)
        makepkg -sf --noconfirm

    - name: Get kernel version
      id: version
      run: |
        # Extract version from built package
        PKG=$(ls -t linux-flatten-*.pkg.tar.zst 2>/dev/null | head -1)
        if [ -z "$PKG" ]; then
          echo "ERROR: No package found"
          exit 1
        fi
        echo "package=$PKG" >> $GITHUB_OUTPUT
        # Extract version from pkg filename or PKGBUILD
        KERNEL_VERSION=$(echo "$PKG" | sed 's/linux-flatten-//;s/-x86_64.pkg.tar.zst//')
        echo "kernel_version=$KERNEL_VERSION" >> $GITHUB_OUTPUT
        echo "PKG: $PKG"
        echo "VERSION: $KERNEL_VERSION"

    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.kernel_version }}
        name: linux-flatten ${{ steps.version.outputs.kernel_version }}
        body: |
          ## linux-flatten ${{ steps.version.outputs.kernel_version }}

          **Универсальное ядро** — совместимо со всеми x86-64 процессорами (Intel и AMD).

          ### Оптимизации
          - **sched/flat** — flattened runqueue от Peter Zijlstra
          - **PREEMPT_LAZY** — минимальные задержки переключения
          - **O3** — максимальная оптимизация компилятора
          - **HZ=1000** — высокая частота таймера
          - **BBR3** — современный TCP congestion control
          - **THP MADVISE** — безопасные huge pages
          - **ZSTD модули** — быстрая загрузка модулей
          - **SHA256 подпись** — быстрая проверка модулей
          - **Без debug info** — минимальный размер

          ### Совместимость
          - Работает на **любом** x86-64 процессоре (v1+)
          - НЕ требует `-march=native`
          - Подходит для Intel Core 2 и новее, AMD Athlon 64 и новее

          ### Установка
          ```bash
          # Установить пакет (ядро + хедеры + модули)
          sudo pacman -U linux-flatten-*.pkg.tar.zst

          # Обновить initramfs
          sudo mkinitcpio -p linux-flatten

          # Обновить загрузчик (Limine)
          sudo limine-scan /boot

          # Перезагрузиться
          sudo reboot
          ```

          ### Проверка
          ```bash
          uname -r
          cat /proc/version
          ```
        files: |
          linux-flatten-*.pkg.tar.zst
          linux-flatten-*-headers-*.pkg.tar.zst
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
