name: Build & Release Kernel (Xeon E31270)

on:
  push:
    branches: [ "main", "xeon-e31270" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    container:
      image: archlinux:latest

    steps:
    - name: Install dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm base-devel git bc kmod inetutils cpio openssl elfutils python pahole zstd linux-firmware

    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Build kernel via makepkg
      run: |
        set -e
        # makepkg refuses to run as root — create a builder user
        useradd -m builder
        chown -R builder:builder "$GITHUB_WORKSPACE"

        # Allow builder to run pacman without password
        echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
        chmod 0440 /etc/sudoers.d/builder

        # Clone + build as non-root user
        su - builder -s /bin/bash -c "cd '$GITHUB_WORKSPACE' && \
          makepkg -sf --noconfirm"

    - name: Get kernel version
      id: version
      run: |
        cd src/linux-flatten
        KERNEL_VERSION=$(make kernelrelease)
        echo "kernel_version=$KERNEL_VERSION" >> $GITHUB_OUTPUT
        echo "VERSION: $KERNEL_VERSION"
        cd "$GITHUB_WORKSPACE"
        ls -lh linux-flatten-*.pkg.tar.zst 2>/dev/null

    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/xeon-e31270'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.kernel_version }}
        name: linux-flatten ${{ steps.version.outputs.kernel_version }}
        body: |
          ## linux-flatten ${{ steps.version.outputs.kernel_version }}

          **Optimized for Intel Xeon E31270 (Sandy Bridge)**

          ### Optimizations
          - **sched/flat** — flattened runqueue by Peter Zijlstra
          - **MCORE2 + MNATIVE** — Sandy Bridge native optimizations
          - **PREEMPT_LAZY** — minimal latency switching
          - **O3** — maximum compiler optimization
          - **HZ=1000** — high timer frequency
          - **BBR3** — modern TCP congestion control
          - **THP MADVISE** — safe huge pages
          - **ZSTD modules** — fast module loading
          - **NR_CPUS=8** — optimized for 4 cores / 8 threads
          - **No debug info** — minimal size
          - **allmodconfig** — ALL drivers as modules

          ### Installation
          ```bash
          sudo pacman -U linux-flatten-*.pkg.tar.zst
          sudo mkinitcpio -p linux-flatten
          sudo reboot
          ```

          ### Verify
          ```bash
          uname -r
          cat /proc/version
          ```
        files: |
          linux-flatten-*.pkg.tar.zst
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
